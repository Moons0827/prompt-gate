# Render Blueprint. 이 서비스는 Blueprint managed 이므로 이 파일이 있어야 한다.
# 비밀값(API 키 등)은 sync:false 로 두어 Render 대시보드에 설정한 값을 그대로 쓴다.
services:
  - type: web
    name: prompt-gate
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      # 비밀 아님 — 여기에 고정한다(재현성). 모델을 바꾸려면 이 값을 고치고 push.
      - key: GENERATOR
        value: anthropic
      # sonnet-5 는 temperature 를 안 받아 재현성(temp=0)이 깨진다.
      # sonnet-4-6 은 temperature=0 을 지원한다(고정 스냅샷, 'latest' 아님).
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: TEMPERATURE
        value: "0.0"
      - key: MAX_TOKENS
        value: "600"
      # 비밀값 — Render 대시보드에 넣은 값을 그대로 쓴다.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
