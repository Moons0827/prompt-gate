<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>prompt-gate — 되돌림 루프</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root { --ink:#1a1a1a; --line:#d8d8d8; --blue:#10367b; --red:#b91c1c; --amber:#b45309; --green:#166534; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Pretendard','맑은 고딕',system-ui,sans-serif; color:var(--ink); background:#f6f7f9; }
  .wrap { max-width:980px; margin:0 auto; padding:24px; }
  h1 { color:var(--blue); font-size:24px; margin:0 0 4px; }
  .sub { color:#666; font-size:14px; margin-bottom:20px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:18px; margin-bottom:14px; }
  .card.alert { border-left:6px solid var(--red); background:#fdf2f2; }
  .card.ok { border-left:6px solid var(--green); background:#f2fbf5; }
  .card.warn { border-left:6px solid var(--amber); background:#fffaf0; }
  textarea { width:100%; min-height:100px; padding:12px; border:1px solid var(--line); border-radius:8px; font:inherit; font-size:15px; resize:vertical; }
  button { padding:10px 18px; border:none; border-radius:8px; font:inherit; font-weight:600; cursor:pointer; }
  .primary { background:var(--blue); color:#fff; }
  .pass { background:var(--green); color:#fff; }
  .return { background:var(--amber); color:#fff; }
  .block { background:var(--red); color:#fff; }
  .ghost { background:#eee; color:#333; }
  .tags { display:flex; gap:8px; flex-wrap:wrap; margin:10px 0; }
  .tag { padding:7px 12px; border:1px solid var(--line); border-radius:20px; cursor:pointer; user-select:none; font-size:14px; background:#fff; }
  .tag.on { background:var(--blue); color:#fff; border-color:var(--blue); }
  .tag.shown { background:#fff3cd; border-color:var(--amber); color:var(--amber); font-weight:600; cursor:default; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .muted { color:#777; font-size:13px; }
  .prompt { background:#f2f5f9; border-radius:8px; padding:12px; font-size:15px; white-space:pre-wrap; }
  .nav { display:flex; gap:8px; margin-bottom:16px; }
  .nav button.on { background:var(--blue); color:#fff; }
  .hint { font-size:13px; color:var(--amber); margin-top:6px; line-height:1.6; white-space:pre-wrap; }
  .badge { display:inline-block; padding:2px 8px; border-radius:6px; font-size:12px; font-weight:600; }
  .b-narr { background:#dcfce7; color:var(--green); }
  .b-acc { background:#fee2e2; color:var(--red); }
  .loginpick { transition:border-color .12s, box-shadow .12s; }
  .loginpick:hover { border-color:var(--blue); box-shadow:0 2px 10px rgba(16,54,123,.12); }
  select { padding:8px; border:1px solid var(--line); border-radius:8px; font:inherit; font-size:15px; background:#fff; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { border:1px solid var(--line); padding:7px 9px; text-align:left; }
  th { background:#f2f2f2; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;
// 배포: 백엔드가 이 페이지도 같이 서비스하면 자동으로 같은 주소(location.origin)를 쓴다.
// 프런트와 백엔드를 서로 다른 곳에 올렸다면 이 <script> 앞에서 window.API_BASE = "https://백엔드주소" 로 지정.
// 로컬에서 파일(file://)로 열면 localhost:8000 을 쓴다.
const API = window.API_BASE
  || (location.protocol.startsWith("http") ? location.origin : "http://localhost:8000");

// 되돌림 태그는 차시마다 다르다 — 백엔드 /api/config/sessions 의 cfg.tags 를 쓴다.
// (기본 4개: 상황·대상·조건·목적, 2차시: 목적·상황·대상·조건·역할·예시)

const STATUS_LABEL = { pending:"검토 중", returned:"돌아옴", passed:"통과", blocked:"차단" };

// 학급 표시명 (school 이 비어도 깔끔하게)
const cn = c => `${c.school || ""} ${c.name}`.trim();

// AI 답에 남은 마크다운 기호를 화면 표시용으로 걷어낸다(문단 줄바꿈은 유지).
const stripMd = (t) => (t || "")
  .replace(/@@\s*(\d+)\s*@@/g, (m,n)=>`\n${n}. `)  // 5개 답 마커(@@1@@) → 번호 줄
  .replace(/^\s*#{1,6}\s*/gm, "")        // 제목(#)
  .replace(/^\s*-{3,}\s*$/gm, "")         // 구분선(---)
  .replace(/\*\*|__/g, "")                // 굵게(**, __)
  .replace(/^\s*[-*]\s+/gm, "• ")         // 목록 기호 → 가운뎃점
  .replace(/`/g, "")                       // 코드 표시(`)
  .replace(/\n{3,}/g, "\n\n")             // 빈 줄 3개 이상 → 2개
  .trim();

// ─────────── 조 화면 (같은 조원이 공유) ───────────
function TeamView({ teamId, teamLabel, sess, cfg, onLogout }) {
  const [text, setText] = useState("");
  const [state, setState] = useState(null);
  const [checks, setChecks] = useState({});   // 5차시 자기점검란

  const load = async () => {
    const r = await fetch(`${API}/api/team/${teamId}/session/${sess}`);
    setState(await r.json());
  };
  // 조원들이 서로의 제출·AI 답을 곧바로 보도록 자동 갱신한다.
  useEffect(() => {
    load();
    const t = setInterval(load, 4000);
    return () => clearInterval(t);
  }, [teamId, sess]);

  const send = async () => {
    const r = await fetch(`${API}/api/team/submit`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ team_id: Number(teamId), session_no: Number(sess), prompt: text }),
    });
    if (!r.ok) { alert((await r.json()).detail); return; }
    setText("");
    load();
  };

  const active = state?.active_status;   // pending | returned | null
  const threads = state?.threads || [];

  return (
    <div>
      <ModuleHeader sess={sess} cfg={cfg} teamLabel={teamLabel} onLogout={onLogout}
        right={<button className="ghost" onClick={load}>새로고침</button>} />
      <div className="muted" style={{margin:"-6px 0 10px 4px"}}>같은 조원이 이 화면을 함께 봅니다 (4초마다 자동 갱신)</div>
      {cfg.intro && <div className="card" style={{background:"#eef2f8"}}>{cfg.intro}</div>}

      {threads.length > 0 && (
        <div className="card">
          <b>우리 조의 질문과 대화</b>
          <div className="muted" style={{marginBottom:6}}>조원 모두에게 똑같이 보입니다.</div>
          {threads.map((th, ti) => (
            <div key={th.submission_id}
              style={{marginTop:12, paddingTop:12,
                      borderTop: ti === 0 ? "none" : "1px dashed var(--line)"}}>
              <div className="muted">
                질문 #{ti + 1} · 되돌림 {th.return_count}회 · {STATUS_LABEL[th.status] || th.status}
              </div>
              {th.versions.map(v => (
                <div key={v.version} style={{marginTop:8}}>
                  <div className="muted">{v.version}판</div>
                  <div className="prompt">{v.prompt}</div>
                  {v.returned && (
                    <div style={{marginTop:6}}>
                      <div className="tags">
                        {v.tags.map(t => <span key={t} className="tag shown">{t}</span>)}
                      </div>
                      <div className="muted">돌아온 까닭</div>
                      <div className="prompt" style={{background:"#fff", border:"1px solid #f0c8c8"}}>{v.reason}</div>
                    </div>
                  )}
                  {v.ai_text && (
                    <div style={{marginTop:6}}>
                      <div className="muted">AI의 답</div>
                      <div className="prompt" style={{background:"#fff", border:"1px solid #cde8d5"}}>{stripMd(v.ai_text)}</div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      {active === "returned" && (
        <div className="card" style={{background:"#fff3f0", border:"2px solid #e88"}}>
          <b style={{fontSize:16}}>✋ 선생님이 질문을 되돌려보냈어요!</b>
          <div className="muted" style={{marginTop:6}}>
            위 <b>우리 조의 질문과 대화</b>에서 <b>돌아온 까닭</b>과 빠진 태그를 확인하고,
            아래에서 질문을 고쳐 다시 보내세요.
          </div>
        </div>
      )}

      {active === "pending" ? (
        <div className="card warn">
          <b>선생님이 보고 계세요.</b>
          <div className="muted" style={{marginTop:6}}>검토가 끝나면 여기에 결과가 나타납니다.</div>
        </div>
      ) : (
        <div className="card">
          <b>{active === "returned" ? "고쳐 쓴 질문 (조가 함께 고칩니다)" : "AI에게 보낼 새 질문"}</b>
          {cfg.answers > 1 && (
            <div className="muted" style={{marginTop:4}}>통과하면 AI가 {cfg.answers}가지로 답해요.</div>
          )}
          {cfg.tags && cfg.tags.length >= 6 && (
            <div style={{marginTop:8, background:"#f2f5f9", borderRadius:8, padding:"10px 12px"}}>
              <div className="muted">만든 질문에 아래 6가지가 있는지 모둠원끼리 확인해봅시다.</div>
              <div style={{marginTop:6, display:"flex", flexWrap:"wrap", gap:"6px 16px"}}>
                {cfg.tags.map((t,i) => (
                  <label key={t.key} title={t.desc} style={{fontSize:14}}>
                    <input type="checkbox" checked={!!checks[i]}
                      onChange={e=>setChecks({...checks, [i]: e.target.checked})} /> {t.label}
                  </label>
                ))}
              </div>
            </div>
          )}
          <textarea value={text} onChange={e=>setText(e.target.value)}
            placeholder={cfg.placeholder || "AI는 우리 학교를 한 번도 본 적이 없어요. 무엇을 알려 주어야 할까요?"} />
          {cfg.selfcheck && (
            <div style={{marginTop:8}}>
              <div className="muted">보내기 전에 스스로 점검해요</div>
              {cfg.selfcheck.map((c, i) => (
                <label key={i} style={{display:"block", fontSize:14, margin:"4px 0"}}>
                  <input type="checkbox" checked={!!checks[i]}
                    onChange={e=>setChecks({...checks, [i]: e.target.checked})} /> {c}
                </label>
              ))}
            </div>
          )}
          <div className="row" style={{marginTop:10}}>
            <button className="primary" onClick={send}
              disabled={!text.trim() || (cfg.selfcheck && !cfg.selfcheck.every((_, i) => checks[i]))}>
              선생님께 보내기
            </button>
            <span className="muted">조원 누구나 보낼 수 있고, 보내면 조원 모두에게 보입니다.</span>
          </div>
        </div>
      )}

      {cfg.options && <ActivitySection teamId={teamId} sess={sess} />}
    </div>
  );
}

// ─────────── 교사: 한 조의 1차시 AI 답(5개) 수정 ───────────
function JudgeAnswerEditor({ teamId }) {
  const [open, setOpen] = useState(false);
  const [items, setItems] = useState(null);
  const [saved, setSaved] = useState(null);
  const loadItems = async () => {
    const r = await fetch(`${API}/api/team/${teamId}/judge`);
    const d = await r.json();
    setItems((d.items || []).map(it => ({ idx: it.index, text: it.text })));
  };
  const toggle = () => { const n = !open; setOpen(n); if (n && !items) loadItems(); };
  const saveItem = async (idx, text) => {
    const r = await fetch(`${API}/api/teacher/judge/item`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ team_id: Number(teamId), idx, text }) });
    if (r.ok) { setSaved(idx); setTimeout(() => setSaved(null), 1500); }
  };
  return (
    <div style={{ marginTop: 6 }}>
      <button className="ghost" onClick={toggle}>{open ? "AI 답 수정 닫기" : "AI 답 수정"}</button>
      {open && !items && <div className="muted" style={{ marginTop: 6 }}>불러오는 중…</div>}
      {open && items && items.map(it => (
        <div key={it.idx} style={{ marginTop: 8 }}>
          <div className="muted">답 {it.idx}</div>
          <textarea value={it.text} style={{ minHeight: 56 }}
            onChange={e => setItems(items.map(x => x.idx === it.idx ? { ...x, text: e.target.value } : x))} />
          <button className="ghost" onClick={() => saveItem(it.idx, it.text)}>
            {saved === it.idx ? "저장됨 ✔" : "저장"}
          </button>
        </div>
      ))}
    </div>
  );
}

// ─────────── 교사 화면 ───────────
function TeacherView({ classroomId, classLabel, sessCfg, onLogout }) {
  const [q, setQ] = useState([]);
  const [sel, setSel] = useState(null);
  const [tags, setTags] = useState({});
  const [reason, setReason] = useState("");
  const [msg, setMsg] = useState(null);
  const DEFAULT_TA = "우리 학교 5학년 학생들이 급식 잔반을 줄이려고 해요. 우리 반은 3일 동안 " +
    "나물을 31번 남겼고, 초등학생이 할 수 있는 방법(포스터 붙이기, 방송하기)만 가능해요. " +
    "우리가 실제로 할 수 있는 급식 잔반 줄이기 방법을 알려 주세요.";
  const [taPrompt, setTaPrompt] = useState(DEFAULT_TA);
  const [ta, setTa] = useState(null);
  const [jq, setJq] = useState([]);
  const [resp, setResp] = useState([]);   // 학생 응답 실시간
  const [maxReturns, setMaxReturns] = useState(0);   // 되돌림 최대 횟수(0=무제한)
  const [maxDirty, setMaxDirty] = useState(false);
  const [teachSess, setTeachSess] = useState(1);     // 교사가 보는 차시
  const [busy, setBusy] = useState(false);           // 통과/되돌림 처리 중
  const [data3Cards, setData3Cards] = useState("");  // 3차시 정보 카드 입력
  const [data3Default, setData3Default] = useState("");
  const [activeSession, setActiveSession] = useState(0);   // 학생에게 열린 차시(0=전체)
  const mode = (sessCfg?.[teachSess] || {}).mode;

  useEffect(() => {   // 현재 열린 차시를 불러와 그 차시를 본다
    fetch(`${API}/api/classrooms`).then(r=>r.json()).then(cs=>{
      const c = (cs||[]).find(x=>x.classroom_id===Number(classroomId));
      if (c) { setActiveSession(c.active_session||0); if (c.active_session>0) setTeachSess(c.active_session); }
    });
  }, [classroomId]);
  const openSession = async (n) => {
    await fetch(`${API}/api/teacher/active-session/${classroomId}`, {method:"POST",
      headers:{"Content-Type":"application/json"}, body:JSON.stringify({session_no:n})});
    setActiveSession(n);
  };

  useEffect(() => {   // 3차시 정보 카드는 폴링과 분리해 한 번만 불러온다(편집 보호)
    fetch(`${API}/api/teacher/data3/cards/${classroomId}`).then(r=>r.ok?r.json():null).then(dd=>{
      if (dd) { setData3Default(dd.default); setData3Cards(dd.text); }
    });
  }, [classroomId]);
  const saveData3Cards = async () => {
    const r = await fetch(`${API}/api/teacher/data3/cards/${classroomId}`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({text: data3Cards})});
    setMsg(r.ok ? {bad:false, text:"정보 카드를 저장했어요. 학생 활동1에 반영됩니다."}
                : {bad:true, text:"저장 실패"});
  };

  const load = async () => {
    const r = await fetch(`${API}/api/teacher/queue/${classroomId}`);
    setQ(await r.json());
    const rs = await fetch(`${API}/api/teacher/settings/${classroomId}`);
    if (rs.ok && !maxDirty) setMaxReturns((await rs.json()).max_returns);
    const r2 = await fetch(`${API}/api/teacher/judge-questions/${classroomId}`);
    if (r2.ok) setJq(await r2.json());
    // 현재 만들어 둔 교사 답과 전송 여부를 유지(새로고침해도 남게).
    // 교사가 편집 중(dirty)이거나 생성 중이면 폴링이 덮어쓰지 않는다.
    const r3 = await fetch(`${API}/api/teacher/judge/teacher-answer/${classroomId}`);
    if (r3.ok) { const d = await r3.json();
      setTa(prev => (prev && (prev.loading || prev.dirty)) ? prev
        : (d.exists ? {text:d.text, prompt:d.prompt, published:d.published} : null)); }
    const r4 = await fetch(`${API}/api/teacher/responses/${classroomId}`);
    if (r4.ok) setResp((await r4.json()).rows || []);
    const r5 = await fetch(`${API}/api/teacher/data3/survey/${classroomId}`);
    if (r5.ok) setSurveyData(await r5.json());
  };
  const [surveyData, setSurveyData] = useState(null);
  const deliverSurvey = async () => {
    const r = await fetch(`${API}/api/teacher/data3/survey-to-cards/${classroomId}`, {method:"POST"});
    const d = await r.json().catch(()=>({}));
    if (!r.ok) { setMsg({bad:true, text:d.detail||"전달 실패"}); return; }
    if (d.text!==undefined) setData3Cards(d.text);
    setMsg({bad:false, text:"우리 반 조사 결과를 정보 카드로 전달했어요. 학생 활동1에 나타납니다."});
    load();
  };
  useEffect(() => { load(); const t = setInterval(load, 5000); return () => clearInterval(t); }, [classroomId]);

  const genTeacherAnswer = async () => {
    setTa({loading:true});
    const r = await fetch(`${API}/api/teacher/judge/teacher-answer`, {method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({classroom_id: Number(classroomId), prompt: taPrompt})});
    const d = await r.json();
    setTa(r.ok ? {...d, published:false} : {error: d.detail});
  };

  const saveTeacherText = async () => {
    const r = await fetch(`${API}/api/teacher/judge/teacher-answer/${classroomId}/text`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({text: ta.text})});
    if (!r.ok) { setTa(prev => ({...prev, error:"수정 저장 실패"})); return; }
    setTa(prev => ({...prev, dirty:false, error:undefined}));
  };

  const sendTeacherAnswer = async () => {
    if (ta?.dirty) await saveTeacherText();   // 편집분 먼저 저장하고 전송
    const r = await fetch(`${API}/api/teacher/judge/teacher-answer/${classroomId}/publish`, {method:"POST"});
    const d = await r.json().catch(()=>({}));
    if (!r.ok) { setTa(prev => ({...prev, error: d.detail || "전송 실패"})); return; }
    setTa(prev => ({...prev, published:true, dirty:false, error:undefined}));
  };

  const saveMaxReturns = async () => {
    const r = await fetch(`${API}/api/teacher/settings/${classroomId}`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({max_returns: maxReturns})});
    if (!r.ok) { setMsg({bad:true, text:"되돌림 횟수 저장 실패"}); return; }
    setMaxDirty(false);
    setMsg({bad:false, text:`되돌림 최대 횟수를 ${maxReturns===0?"무제한":maxReturns+"번"}으로 저장했어요.`});
  };

  const act = async (decision) => {
    if (busy) return;                 // 중복 클릭 방지
    setBusy(true);
    try {
      const r = await fetch(`${API}/api/teacher/review`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ version_id: sel.version_id, decision, reason, ...tags }),
      });
      const d = await r.json();
      if (!r.ok) { setMsg({ bad: true, text: d.detail }); return; }
      setMsg({
        bad: false,
        text:
          decision === "passed"
            ? (d.fidelity_alert
                ? `⚠ 처치 오염 : ${d.fidelity_alert}\n(기록되었습니다. 연구자에게 알리세요.)`
                : "통과. 학생 프롬프트가 그대로 AI에 전송되었습니다.")
            : `되돌림 완료.` + (d.reason_type && d.reason_type !== "unknown" ? ` 까닭 유형 : ${d.reason_type}` : "") + (d.nudge ? "\n\n" + d.nudge : ""),
      });
      setSel(null); setTags({}); setReason("");
      load();
    } finally {
      setBusy(false);
    }
  };

  const resetSession = async () => {
    const sc = sessCfg?.[teachSess] || {};
    if (!confirm(`${classLabel} · ${teachSess}차시(${sc.title||""}) 활동 데이터만 지웁니다.\n다른 차시와 다른 학급은 그대로예요. 조 구성도 남습니다.\n\n정말 초기화할까요?`)) return;
    const code = prompt("초기화 코드를 입력하세요.");
    if (code == null) return;
    const r = await fetch(`${API}/api/teacher/reset/${classroomId}/${teachSess}`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code }),
    });
    const d = await r.json().catch(()=>({}));
    if (!r.ok) { setMsg({ bad: true, text: d.detail || "초기화 실패" }); return; }
    setMsg({ bad: false, text: `${teachSess}차시 초기화 완료. 학생이 새로 시작할 수 있습니다.` });
    setSel(null); load();
  };

  const isControl = sel?.condition === "control";
  const narrHint = reason.length > 0 && reason.length < 20;
  const atLimit = !!sel && maxReturns > 0 && (sel.return_count || 0) >= maxReturns;

  return (
    <div>
      <div className="card row" style={{justifyContent:"space-between", alignItems:"center"}}>
        <div className="row" style={{alignItems:"center", gap:10, flexWrap:"wrap"}}>
          <b>{classLabel}</b>
          <select value={teachSess} onChange={e=>{const n=Number(e.target.value); setTeachSess(n); setSel(null); openSession(n);}}
            style={{padding:8, borderRadius:8, border:"1px solid var(--line)", font:"inherit"}}>
            {Object.values(sessCfg||{}).sort((a,b)=>a.no-b.no).map(sc => (
              <option key={sc.no} value={sc.no}>{sc.no}차시 · {sc.title}</option>
            ))}
          </select>
          <span className="badge" style={{background: activeSession>0?"#2a8a4a":"#999", color:"#fff", padding:"2px 8px", borderRadius:6, fontSize:12}}>
            {activeSession>0 ? `학생에게 ${activeSession}차시 열림` : "학생 전체 열림"}
          </span>
          {activeSession>0 &&
            <button className="ghost" onClick={()=>openSession(0)}>전체 열기(제한 해제)</button>}
        </div>
        <div className="row">
          <button className="ghost" onClick={load}>새로고침</button>
          <button className="ghost" onClick={onLogout}>로그아웃</button>
        </div>
      </div>

      <div className="card row" style={{justifyContent:"space-between", alignItems:"center"}}>
        <div className="muted">지금 보는 <b>{teachSess}차시</b>의 이 학급 활동 데이터만 지웁니다. (코드 필요)</div>
        <button className="block" onClick={resetSession}>이 차시 초기화</button>
      </div>

      {mode === "data" && (
      <div className="card">
        <b>3차시 · 우리 반 조사 결과 받기 → 전달</b>
        <div className="muted" style={{margin:"4px 0"}}>
          각 조가 저장한 조사를 모아 보여줍니다. 확인 후 <b>전달</b>하면 학생 활동1의 정보 카드가 됩니다.
        </div>
        {(!surveyData || surveyData.survey.teams===0) ? (
          <div className="muted">아직 조사를 저장한 조가 없어요. (학생이 도입 조사를 저장하면 여기 모입니다)</div>
        ) : (
          <>
            <div>{surveyData.survey.teams}개 조 · 우리 반 {surveyData.survey.members}명 중 <b>{surveyData.survey.left}명</b>이 남겼어요.</div>
            {surveyData.survey.reasons.length>0 &&
              <div style={{marginTop:4}}>이유별: {surveyData.survey.reasons.map(r=>`${r.why} ${r.count}명`).join(" · ")}</div>}
            <div className="muted" style={{marginTop:8}}>조별</div>
            {surveyData.per_team.map(p=>(
              <div key={p.team_no} className="prompt" style={{marginTop:4}}>
                <b>{p.team_no}조</b> · {p.members}명 중 {p.left}명 남김
                {p.etc_note && <span> · 기타 의견: <b>{p.etc_note}</b></span>}
              </div>
            ))}
            {surveyData.survey.etc_notes.length>0 && (
              <div style={{marginTop:8}}>
                <div className="muted">기타 의견 모음</div>
                {surveyData.survey.etc_notes.map((n,i)=><div key={i} className="prompt" style={{marginTop:4}}>{n}</div>)}
              </div>
            )}
            <div className="row" style={{marginTop:10, alignItems:"center"}}>
              <button className="primary" onClick={deliverSurvey}>학생에게 정보 카드로 전달</button>
              {surveyData.delivered && <span className="ok" style={{padding:"6px 10px", borderRadius:8}}>✔ 전달됨</span>}
            </div>
          </>
        )}
      </div>
      )}

      {mode === "data" && (
      <div className="card">
        <b>3차시 · 우리 반 정보 카드(설문 결과) 직접 입력(선택)</b>
        <div className="muted" style={{margin:"4px 0"}}>
          도입에서 조사한 <b>설문 결과</b>를 한 줄에 하나씩 <b>정보 카드</b>로 적어 주세요.
          학생이 활동1에서 이 카드를 받아 고릅니다. 유형을 붙이려면 앞에
          <b> [숫자] [이유별] [친구의 말] [관계없음] </b>처럼 써요. (비워 두면 예시 카드가 나갑니다.)
        </div>
        <textarea value={data3Cards} onChange={e=>setData3Cards(e.target.value)}
          style={{minHeight:160}} placeholder={data3Default} />
        <div className="row" style={{marginTop:8}}>
          <button className="primary" onClick={saveData3Cards}>정보 카드 저장 (학생에게 전달)</button>
          <button className="ghost" onClick={()=>setData3Cards(data3Default)}>예시 불러오기</button>
        </div>
      </div>
      )}

      {mode === "loop" && (
      <div className="card row" style={{justifyContent:"space-between", alignItems:"center"}}>
        <div>
          <b>되돌림 최대 횟수</b>
          <span className="muted"> · 한 질문을 최대 몇 번까지 되돌릴 수 있는지 (0 = 무제한)</span>
        </div>
        <div className="row" style={{alignItems:"center"}}>
          <input type="number" min="0" max="20" value={maxReturns}
            onChange={e=>{setMaxReturns(Number(e.target.value)); setMaxDirty(true);}}
            style={{width:70, padding:8, borderRadius:8, border:"1px solid var(--line)", font:"inherit"}} />
          <button className="ghost" onClick={saveMaxReturns}>{maxDirty ? "저장" : "저장됨"}</button>
        </div>
      </div>
      )}

      {mode === "judge" && (<>
      <div className="card">
        <div className="row" style={{justifyContent:"space-between"}}>
          <b>1차시 활동3 — 선생님의 자세한 질문으로 AI 답 만들기</b>
          <button className="ghost" onClick={genTeacherAnswer}>AI 답 만들기</button>
        </div>
        <div className="muted" style={{margin:"4px 0"}}>
          맥락을 담은 자세한 프롬프트로 AI 답을 만든 뒤, 확인하고 <b>전송</b>을 눌러야 학생 화면에 나타납니다.
          1차시 판정 답은 각 조가 직접 만들고, 2~5차시 학생 질문은 아래 대기열로 옵니다.
        </div>
        <textarea value={taPrompt} onChange={e=>setTaPrompt(e.target.value)} />
        {ta?.loading && <div className="muted" style={{marginTop:8}}>생성 중…</div>}
        {ta?.error && <div className="hint" style={{marginTop:8}}>{ta.error}</div>}
        {ta?.text !== undefined && ta?.text !== null && (
          <div style={{marginTop:8}}>
            <div className="muted">AI 답 (직접 고칠 수 있어요. 전송해야 학생이 봅니다)</div>
            <textarea value={ta.text} style={{minHeight:120, background:"#fff", border:"1px solid #cde8d5"}}
              onChange={e=>setTa(prev=>({...prev, text:e.target.value, dirty:true}))} />
            <div className="row" style={{marginTop:10, alignItems:"center"}}>
              <button className="ghost" onClick={saveTeacherText}>{ta.dirty ? "수정 저장" : "저장됨"}</button>
              {ta.published ? (
                <>
                  <span className="ok" style={{padding:"6px 10px", borderRadius:8}}>✔ 학생에게 전송됨</span>
                  <button className="ghost" onClick={sendTeacherAnswer}>다시 전송</button>
                </>
              ) : (
                <>
                  <button className="primary" onClick={sendTeacherAnswer}>학생에게 전송</button>
                  <span className="muted">아직 학생에게 안 보입니다.</span>
                </>
              )}
            </div>
          </div>
        )}
      </div>

      <div className="card">
        <b>1차시 — 각 조가 AI에게 물어본 질문</b>
        <div className="muted" style={{margin:"4px 0"}}>
          학생이 직접 쓴 질문입니다. (5초마다 자동 갱신)
        </div>
        {jq.length === 0 ? (
          <div className="muted" style={{marginTop:8}}>아직 질문을 보낸 조가 없습니다.</div>
        ) : (
          jq.map(item => (
            <div key={item.team_no} className="prompt" style={{marginTop:8}}>
              <b>{item.team_no}조</b> · <span className="muted">답 {item.answers}개</span>
              <div style={{marginTop:4}}>{item.question}</div>
              <JudgeAnswerEditor teamId={item.team_id} />
            </div>
          ))
        )}
      </div>
      </>)}

      <div className="card">
        <b>학생 응답 실시간 — {teachSess}차시</b>
        <div className="muted" style={{margin:"4px 0"}}>
          각 조가 이 차시 활동에서 답한 내용입니다. (5초마다 자동 갱신)
        </div>
        {(() => {
          const students = resp.filter(r => r.team !== "-" && r.session === teachSess);
          if (students.length === 0)
            return <div className="muted" style={{marginTop:8}}>아직 응답이 없습니다.</div>;
          const teamNos = [...new Set(students.map(r => r.team))].sort((a,b)=>Number(a)-Number(b));
          return teamNos.map(tn => (
            <div key={tn} style={{marginTop:12, borderTop:"1px dashed var(--line)", paddingTop:8}}>
              <b>{tn}조</b>
              <div style={{marginTop:6, overflowX:"auto"}}>
                <table style={{width:"100%", fontSize:13}}>
                  <tbody>
                    {students.filter(r => r.team === tn).map((r,i) => (
                      <tr key={i}>
                        <td style={{whiteSpace:"nowrap", color:"var(--muted)"}}>{r.session}차시</td>
                        <td style={{whiteSpace:"nowrap"}}>{r.kind}{r.detail?` ${r.detail}`:""}</td>
                        <td style={{textAlign:"left", whiteSpace:"pre-wrap"}}>{r.value}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          ));
        })()}
      </div>

      {msg && (
        <div className={"card " + (msg.bad ? "alert" : "ok")}>
          <pre style={{margin:0, whiteSpace:"pre-wrap", font:"inherit"}}>{msg.text}</pre>
          <button className="ghost" style={{marginTop:8}} onClick={()=>setMsg(null)}>닫기</button>
        </div>
      )}

      {mode === "loop" && (<>
      <div className="card" style={{background:"#f7f9fc"}}>
        <b>되돌림 대기열 — {teachSess}차시</b>
        <span className="muted"> · {q.filter(x=>x.session_no===teachSess).length}건 대기 (5초 자동 갱신)</span>
        {q.filter(x=>x.session_no===teachSess).length===0 &&
          <div className="muted" style={{marginTop:6}}>아직 검토할 질문이 없습니다.</div>}
      </div>

      {!sel && q.filter(x=>x.session_no===teachSess).map(item => (
        <div key={item.submission_id} className="card" onClick={()=>{setSel(item);setMsg(null);}} style={{cursor:"pointer"}}>
          <div className="row" style={{justifyContent:"space-between"}}>
            <b>{item.team_no}조 · {item.session_no}차시 · {item.version}판</b>
            <span className="muted">
              {item.condition === "treatment" ? "처치" : "통제"} · 되돌림 {item.return_count}{maxReturns>0?`/${maxReturns}`:""}회
            </span>
          </div>
          <div className="prompt" style={{marginTop:8}}>{item.prompt}</div>
        </div>
      ))}

      {sel && (
        <div className="card">
          <div className="row" style={{justifyContent:"space-between"}}>
            <b>{sel.team_no}조 · {sel.session_no}차시 · {sel.version}판</b>
            <button className="ghost" onClick={()=>setSel(null)}>목록으로</button>
          </div>
          <div className="prompt" style={{marginTop:10}}>{sel.prompt}</div>

          {isControl ? (
            <div className="card warn" style={{marginTop:14}}>
              <b>통제 조건입니다.</b>
              <div className="muted" style={{marginTop:6}}>
                교육적 되돌림을 할 수 없습니다. 유해한 내용이 아니면 통과시킵니다.
                통제 학급도 AI 응답을 받습니다 — 차이는 그것 하나뿐입니다.
              </div>
              <div className="row" style={{marginTop:12}}>
                <button className="pass" onClick={()=>act("passed")} disabled={busy}>
                  {busy ? "전송중입니다…" : "통과"}
                </button>
                <button className="block" onClick={()=>act("blocked")} disabled={busy}>유해 차단</button>
              </div>
            </div>
          ) : (
            <div style={{marginTop:14}}>
              <div className="muted">빠진 것 (되돌릴 때만){sel.session_no===2 && " · 2차시는 6개 태그"}</div>
              <div className="tags">
                {((sessCfg?.[sel.session_no] || {}).tags || []).map(({key, label, desc}) => (
                  <span key={key} title={desc}
                    className={"tag" + (tags[key] ? " on" : "")}
                    onClick={()=>setTags({...tags, [key]: !tags[key]})}>{label}</span>
                ))}
              </div>

              <div className="muted" style={{marginTop:10}}>
                까닭 <b>(선택)</b> — 태그만으로도 되돌릴 수 있어요. 쓴다면 <b>그 사람이 이 질문을 받으면
                무슨 일이 일어나는지</b> 이야기로 써 주세요.
              </div>
              <textarea value={reason} onChange={e=>setReason(e.target.value)}
                placeholder={"(선택) 1학년이 이 포스터를 보면 '잔반율'에서 멈출 거예요. 그 아이는 그 말을 들어 본 적이 없거든요."} />
              {narrHint && (
                <div className="hint">
                  {"✗ \"[대상]이 부족합니다.\"  ← 이렇게 쓰면 학생은 규칙만 외웁니다.\n○ \"1학년이 이 포스터를 보면 '잔반율'에서 멈출 거예요.\"  ← 이렇게 써 주세요.\n※ 고친 문장을 주지는 마세요. 그것은 학생의 몫입니다."}
                </div>
              )}

              <div className="card warn" style={{marginTop:12, padding:12}}>
                <b>할 수 있는 것은 두 가지뿐입니다 — 통과 / 되돌림.</b>
                <div className="muted">학생의 질문을 대신 고칠 수 없습니다. 시도하면 기록됩니다.</div>
              </div>

              <div className="muted" style={{marginTop:10}}>
                되돌림 {sel.return_count}{maxReturns>0?`/${maxReturns}`:""}회
                {atLimit && <b style={{color:"var(--red)"}}> · 되돌림 횟수를 다 썼어요. 통과시키세요.</b>}
              </div>
              <div className="row" style={{marginTop:12}}>
                <button className="pass" onClick={()=>act("passed")} disabled={busy}>
                  {busy ? "전송중입니다…" : "통과 (그대로 AI에 전송)"}
                </button>
                <button className="return" onClick={()=>act("returned")} disabled={busy || atLimit}>
                  되돌림{atLimit ? " (횟수 소진)" : ""}
                </button>
                <button className="block" onClick={()=>act("blocked")} disabled={busy}>유해 차단</button>
              </div>
            </div>
          )}
        </div>
      )}
      </>)}
    </div>
  );
}

// ─────────── 연구자 화면 ───────────
function AdminView({ onLogout }) {
  const [rows, setRows] = useState([]);
  const [cfg, setCfg] = useState(null);
  const [msg, setMsg] = useState(null);
  const [collect, setCollect] = useState(null);   // 응답 수집 결과
  const load = () => {
    fetch(`${API}/api/admin/fidelity`).then(r=>r.json()).then(setRows);
    fetch(`${API}/api/admin/config`).then(r=>r.json()).then(setCfg);
  };
  useEffect(() => { load(); }, []);

  const loadCollect = async () => {
    setCollect({loading:true});
    const r = await fetch(`${API}/api/admin/collect`);
    const d = await r.json();
    setCollect(d);
  };

  const reset = async () => {
    if (!confirm("모든 활동 데이터(제출·판정·대화·기록)를 지웁니다. 학급·조는 남습니다.\n정말 초기화할까요?")) return;
    const code = prompt("초기화 코드를 입력하세요:");
    if (code == null) return;
    const r = await fetch(`${API}/api/admin/reset`, {method:"POST",
      headers:{"Content-Type":"application/json"}, body: JSON.stringify({code})});
    if (!r.ok) { setMsg({bad:true, text:(await r.json()).detail}); return; }
    setMsg({bad:false, text:"초기화 완료. 모든 조의 활동 데이터가 지워졌습니다."}); load();
  };

  return (
    <div>
      <div className="row" style={{justifyContent:"space-between", marginBottom:10}}>
        <button className="block" onClick={reset}>초기화 (활동 데이터 삭제)</button>
        <button className="ghost" onClick={onLogout}>처음으로</button>
      </div>
      {msg && (
        <div className={"card " + (msg.bad ? "alert" : "ok")}>
          <span>{msg.text}</span>
          <button className="ghost" style={{marginLeft:10}} onClick={()=>setMsg(null)}>닫기</button>
        </div>
      )}
      <div className="card">
        <div className="row" style={{justifyContent:"space-between"}}>
          <b>응답 수집 — 모든 조의 활동 기록</b>
          <div className="row">
            <button className="ghost" onClick={loadCollect}>화면에서 보기</button>
            <a className="primary" href={`${API}/api/admin/collect.csv`} download="promptgate_collect.csv"
              style={{textDecoration:"none", padding:"8px 12px", borderRadius:8}}>CSV 내려받기</a>
          </div>
        </div>
        <div className="muted" style={{marginTop:4}}>
          판정 질문·판정·비교 메모·학생 질문·교사 판정·AI 답·적합 판정·교사 답을 학급/조/차시별로 모읍니다.
        </div>
        {collect?.loading && <div className="muted" style={{marginTop:8}}>불러오는 중…</div>}
        {collect?.rows && (
          <div style={{marginTop:10, maxHeight:360, overflow:"auto", border:"1px solid var(--line)", borderRadius:8}}>
            <table style={{width:"100%", fontSize:13}}>
              <thead><tr>
                <th>학급</th><th>조</th><th>차시</th><th>항목</th><th>세부</th><th style={{textAlign:"left"}}>내용</th>
              </tr></thead>
              <tbody>
                {collect.rows.map((r,i)=>(
                  <tr key={i}>
                    <td>{r.classroom}</td><td>{r.team}</td><td>{r.session}</td>
                    <td>{r.kind}</td><td className="muted">{r.detail}</td>
                    <td style={{textAlign:"left", whiteSpace:"pre-wrap"}}>{r.value}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
        {collect?.rows && <div className="muted" style={{marginTop:6}}>총 {collect.count}행</div>}
      </div>

      {cfg && (
        <div className={"card " + (cfg.warning ? "alert" : "ok")}>
          <b>생성기 설정 (매 호출마다 로그에 남습니다)</b>
          <table style={{marginTop:8}}>
            <tbody>
              <tr><th>생성기</th><td>{cfg.generator}</td></tr>
              <tr><th>모델 (버전 고정)</th><td><code>{cfg.model}</code></td></tr>
              <tr><th>temperature</th><td>{cfg.temperature}</td></tr>
              <tr><th>시스템 프롬프트 해시</th><td><code>{cfg.system_prompt_hash}</code></td></tr>
            </tbody>
          </table>
          {cfg.warning && <div className="hint">{cfg.warning}</div>}
        </div>
      )}
      <div className="card">
        <b>처치 충실도 — 학급별</b>
        <div className="muted" style={{marginBottom:10}}>
          서사형 비율이 낮은 학급은 처치가 전달되지 않은 것입니다.
          모델 되묻기 비율과 불변식 위반은 <b>0이어야</b> 합니다.
        </div>
        <table>
          <thead>
            <tr>
              <th>학급</th><th>조건</th><th>제출</th><th>되돌림</th>
              <th>평균 되돌림</th>
              <th>★ 서사형 비율</th><th>정확성형</th>
              <th>★ 모델 되묻기</th><th>★ 불변식 위반</th>
              <th>사용 모델</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r,i)=>(
              <tr key={i}>
                <td>{r.classroom}</td>
                <td>{r.condition === "treatment" ? "처치" : "통제"}</td>
                <td>{r.submissions}</td>
                <td>{r.returns}</td>
                <td>{r.mean_return_count}</td>
                <td>
                  {r.narrative_reason_rate == null ? "—" :
                    <span className={"badge " + (r.narrative_reason_rate >= 0.7 ? "b-narr" : "b-acc")}>
                      {(r.narrative_reason_rate*100).toFixed(0)}%
                    </span>}
                </td>
                <td>{r.accuracy_reason_count}</td>
                <td>
                  {r.model_asked_back_rate == null ? "—" :
                    <span className={"badge " + (r.model_asked_back_rate === 0 ? "b-narr" : "b-acc")}>
                      {(r.model_asked_back_rate*100).toFixed(1)}%
                    </span>}
                </td>
                <td>
                  <span className={"badge " + (r.invariant_violations === 0 ? "b-narr" : "b-acc")}>
                    {r.invariant_violations}
                  </span>
                </td>
                <td><code style={{fontSize:11}}>{(r.models_used||[]).join(", ") || "—"}</code></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─────────── 차시 공통 헤더 ───────────
function ModuleHeader({ sess, cfg, teamLabel, onLogout, right }) {
  return (
    <div className="card row" style={{justifyContent:"space-between", alignItems:"flex-start"}}>
      <div>
        <b>{teamLabel}</b> <span className="muted">· {sess}차시 · {cfg.title}</span>
        <div className="muted" style={{marginTop:2}}>{cfg.question}</div>
      </div>
      <div className="row">
        {right}
        <button className="ghost" onClick={onLogout}>로그아웃</button>
      </div>
    </div>
