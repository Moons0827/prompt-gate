}

// ─────────── 1차시 — AI 답 5개 판정표 ───────────
function JudgeModule({ teamId, teamLabel, sess, cfg, onLogout }) {
  const [data, setData] = useState(null);
  const [edit, setEdit] = useState({});     // {index:{verdict,reason}}
  const [msg, setMsg] = useState(null);
  const [gen, setGen] = useState(false);
  const [q, setQ] = useState("");        // 우리 조가 AI에게 물어볼 질문
  const [compare, setCompare] = useState("");   // 활동3: 선생님 답과 비교
  const [editingCompare, setEditingCompare] = useState(false);
  const VERD = [[1,"바로 쓸 수 있다"],[2,"우리 학교엔 안 맞다"],[3,"우리가 못 한다"]];

  const load = async () => {
    const r = await fetch(`${API}/api/team/${teamId}/judge`);
    const d = await r.json(); setData(d);
    setEdit(prev => {
      const e = {...prev};
      d.items.forEach(it => { if (!(it.index in e)) e[it.index] = {verdict: it.verdict, reason: it.reason || ""}; });
      return e;
    });
    setCompare(prev => prev || d.compare || "");
  };

  const saveCompare = async () => {
    await fetch(`${API}/api/team/note`, {method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({team_id:Number(teamId), session_no:1, key:"compare", text:compare})});
    load();
  };
  useEffect(() => { load(); const t=setInterval(load,5000); return ()=>clearInterval(t); }, [teamId]);

  const save = async () => {
    const verdicts = Object.entries(edit).filter(([,v])=>v.verdict)
      .map(([i,v])=>({item_index:Number(i), verdict:v.verdict, reason:v.reason||""}));
    if (!verdicts.length) { setMsg({bad:true, text:"판정을 하나 이상 골라 주세요."}); return; }
    const r = await fetch(`${API}/api/team/judge`, {method:"POST",
      headers:{"Content-Type":"application/json"}, body: JSON.stringify({team_id:Number(teamId), verdicts})});
    const d = await r.json();
    if (!r.ok) { setMsg({bad:true, text:d.detail}); return; }
    setMsg({bad:false, text:`판정 ${d.saved}개를 저장했어요.`}); load();
  };

  const generate = async () => {
    if (!q.trim()) return;
    setGen(true);
    const r = await fetch(`${API}/api/team/judge/generate`, {method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({team_id:Number(teamId), prompt: q})});
    if (!r.ok) { setMsg({bad:true, text:(await r.json()).detail}); }
    setGen(false); load();
  };

  return (
    <div>
      <ModuleHeader sess={sess} cfg={cfg} teamLabel={teamLabel} onLogout={onLogout}
        right={<button className="ghost" onClick={load}>새로고침</button>} />
      {cfg.intro && <div className="card" style={{background:"#eef2f8"}}>{cfg.intro}</div>}
      {!data ? <div className="card">불러오는 중…</div> : (
        <>
        <div className="card">
          <b>활동 1 · AI에게 물어봐요</b>
          <div className="muted" style={{margin:"6px 0"}}>
            AI에게 급식 잔반을 줄일 수 있는지 질문을 하려고 합니다. 모둠원과 상의해서
            어떤 질문을 할지 적어보세요. (AI가 답 5개를 주면 하나씩 분류합니다.)
          </div>
          {!data.ready ? (
            <>
              <textarea value={q} onChange={e=>setQ(e.target.value)}
                placeholder="예: 급식 잔반을 줄이는 방법을 알려 줘." />
              <div className="row" style={{marginTop:10}}>
                <button className="primary" onClick={generate} disabled={gen || !q.trim()}>
                  {gen ? "물어보는 중…" : "AI에게 물어보기 (답 5개 받기)"}
                </button>
                <span className="muted">조원 누구나 보낼 수 있고, 답은 조 전체가 함께 봅니다.</span>
              </div>
              {msg?.bad && <div className="hint" style={{marginTop:8}}>{msg.text}</div>}
            </>
          ) : (
            <div>
              <div className="muted">우리 조가 AI에게 보낸 질문</div>
              <div className="prompt">{data.question}</div>
              <div className="muted" style={{marginTop:6, color:"var(--green,#2a8a4a)"}}>
                ✔ AI가 답 5개를 주었어요. 아래 활동2에서 하나씩 분류합니다.
              </div>
            </div>
          )}
        </div>

        {data.ready && (
        <div className="card">
          <b>활동 2 · AI 답을 분류해요</b>
          <div className="muted" style={{marginTop:6}}>
            AI가 알려준 답을 아래 기준에 따라 분류하고, 왜 그렇게 생각했는지 모둠원과 상의해서 적어보세요.
          </div>
          <div className="prompt" style={{marginTop:8, fontSize:14, lineHeight:1.7}}>
            <div><b>① 바로 쓸 수 있다</b> — 우리 학교 및 반에서 지금 그대로 해 볼 수 있다.</div>
            <div><b>② 우리 학교엔 안 맞다</b> — 좋은 말이지만 우리 학교 및 반의 사정과 맞지 않는다.</div>
            <div><b>③ 우리가 못 한다</b> — 초등학생인 우리 힘으로는 할 수 없는 일이다.</div>
          </div>
          {data.items.map(it => (
            <div key={it.index} style={{marginTop:12, borderTop:"1px dashed var(--line)", paddingTop:10}}>
              <div><b>{it.index}.</b> {it.text}</div>
              <div className="tags" style={{marginTop:8}}>
                {VERD.map(([val,label]) => (
                  <span key={val} className={"tag" + (edit[it.index]?.verdict===val ? " on":"")}
                    onClick={()=>setEdit({...edit, [it.index]:{...edit[it.index], verdict:val}})}>{val} {label}</span>
                ))}
              </div>
              {edit[it.index]?.verdict && (
                <input placeholder="분류한 이유 (왜 그렇게 생각했나요?)" value={edit[it.index]?.reason||""}
                  onChange={e=>setEdit({...edit, [it.index]:{...edit[it.index], reason:e.target.value}})}
                  style={{width:"100%", marginTop:8, padding:8, border:"1px solid var(--line)", borderRadius:8, font:"inherit"}} />
              )}
            </div>
          ))}
          <div className="row" style={{marginTop:14}}>
            <button className="primary" onClick={save}>판정 저장</button>
            {msg && <span className="muted" style={msg.bad?{color:"var(--red)"}:{}}>{msg.text}</span>}
          </div>
        </div>
        )}
        </>
      )}

      {cfg.teacher_compare && (
        <div className="card">
          <b>활동 3 · 선생님의 질문과 비교해요</b>
          {data?.teacher_answer ? (
            <div style={{marginTop:8}}>
              <div className="muted">선생님이 받은 AI 답</div>
              <div className="prompt" style={{background:"#fff", border:"1px solid #cde8d5"}}>{stripMd(data.teacher_answer.text)}</div>
            </div>
          ) : (
            <div className="muted" style={{marginTop:6}}>아직 선생님이 활동3 답을 만들지 않았어요.</div>
          )}
          <div className="muted" style={{marginTop:10}}>
            선생님의 질문에 대한 AI의 답변과, 여러분의 질문에 대한 AI의 답변이 어떻게 달랐는지
            모둠원끼리 토의해서 적어보세요.
          </div>
          {(!data?.compare || editingCompare) ? (
            <>
              <textarea value={compare} onChange={e=>setCompare(e.target.value)}
                placeholder="예: 선생님은 우리 반이 무엇을 남기는지 알려 줘서 우리 학교에 맞는 답이 왔어요." />
              <div className="row" style={{marginTop:8}}>
                <button className="primary" disabled={!compare.trim()}
                  onClick={async()=>{ await saveCompare(); setEditingCompare(false); }}>비교 저장</button>
              </div>
            </>
          ) : (
            <div style={{marginTop:6}}>
              <div className="prompt" style={{background:"#fff", border:"1px solid #cde8d5"}}>{data.compare}</div>
              <button className="ghost" style={{marginTop:8}}
                onClick={()=>{ setCompare(data.compare); setEditingCompare(true); }}>수정</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─────────── 6차시 — 스티커 역추적 (자기 태그) ───────────
function RetraceModule({ teamId, teamLabel, sess, cfg, onLogout }) {
  const [data, setData] = useState(null);
  const [srcId, setSrcId] = useState(null);
  const [tags, setTags] = useState({});
  const [note, setNote] = useState("");
  const [msg, setMsg] = useState(null);

  const load = async () => {
    const r = await fetch(`${API}/api/team/${teamId}/retrace`);
    const d = await r.json(); setData(d);
    if (d.sources.length && srcId==null) setSrcId(d.sources[0].version_id);
  };
  useEffect(() => { load(); const t=setInterval(load,5000); return ()=>clearInterval(t); }, [teamId]);

  const save = async () => {
    const r = await fetch(`${API}/api/team/retrace`, {method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({team_id:Number(teamId), source_version_id: srcId, retrace_note: note, ...tags})});
    const d = await r.json();
    if (!r.ok) { setMsg({bad:true, text:d.detail}); return; }
    setMsg({bad:false, text:"역추적을 저장했어요."}); setTags({}); setNote(""); load();
  };
  const cur = data?.sources.find(s=>s.version_id===srcId) || data?.sources[0];

  return (
    <div>
      <ModuleHeader sess={sess} cfg={cfg} teamLabel={teamLabel} onLogout={onLogout} />
      <div className="card">
        <b>1) 우리 5차시 질문을 다시 읽어요</b>
        {(!data || !data.sources.length) ? (
          <div className="muted" style={{marginTop:6}}>5차시에 통과된 질문이 없어요. (5차시를 먼저 해야 합니다)</div>
        ) : (
          <div style={{marginTop:8}}>
            {data.sources.length>1 && (
              <select value={srcId||""} onChange={e=>setSrcId(Number(e.target.value))} style={{marginBottom:8}}>
                {data.sources.map((s,i)=><option key={s.version_id} value={s.version_id}>질문 {i+1}</option>)}
              </select>
            )}
            <div className="prompt">{cur?.prompt}</div>
          </div>
        )}
      </div>
      <div className="card">
        <b>2) 스티커 결과를 단서로, 빠진 것에 스스로 태그를 붙여요</b>
        <div className="tags" style={{marginTop:8}}>
          {(cfg.tags||[]).map(({key,label,desc})=>(
            <span key={key} title={desc} className={"tag"+(tags[key]?" on":"")}
              onClick={()=>setTags({...tags,[key]:!tags[key]})}>{label}</span>
          ))}
        </div>
        <div className="muted" style={{marginTop:10}}>3) 결과 → 질문 역추적을 한 줄로</div>
        <textarea value={note} onChange={e=>setNote(e.target.value)}
          placeholder="예: 1학년 복도에서만 스티커가 적었다 → [대상] 태그를 붙였지만 '잔반율'이라는 어려운 말을 그대로 썼다." />
        <div className="row" style={{marginTop:10}}>
          <button className="primary" onClick={save}>역추적 저장</button>
          {msg && <span className="muted" style={msg.bad?{color:"var(--red)"}:{}}>{msg.text}</span>}
        </div>
      </div>
      {data && data.saved.length>0 && (
        <div className="card ok">
          <b>우리가 적은 역추적</b>
          {data.saved.map((r,i)=>(
            <div key={i} style={{marginTop:8}}>
              <div className="tags">{r.tags.map(t=><span key={t} className="tag shown">{t}</span>)}</div>
              <div className="prompt" style={{background:"#fff"}}>{r.note}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─────────── 7차시 — 동료 판별 ───────────
function PeerModule({ teamId, teamLabel, sess, cfg, onLogout }) {
  const [data, setData] = useState(null);
  const [sel, setSel] = useState(null);   // target version_id
  const [tags, setTags] = useState({});
  const [reason, setReason] = useState("");
  const [msg, setMsg] = useState(null);

  const load = async () => { const r=await fetch(`${API}/api/team/${teamId}/peer`); setData(await r.json()); };
  useEffect(() => { load(); const t=setInterval(load,5000); return ()=>clearInterval(t); }, [teamId]);
  const target = data?.targets.find(t=>t.version_id===sel);

  const submit = async () => {
    const r = await fetch(`${API}/api/team/peer-review`, {method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({reviewer_team_id:Number(teamId), target_version_id: sel, reason, ...tags})});
    const d = await r.json();
    if (!r.ok) { setMsg({bad:true, text:d.detail}); return; }
    setMsg({bad:false, text:`되돌렸어요. 까닭 유형: ${d.reason_type}`}); setSel(null); setTags({}); setReason(""); load();
  };

  return (
    <div>
      <ModuleHeader sess={sess} cfg={cfg} teamLabel={teamLabel} onLogout={onLogout}
        right={<button className="ghost" onClick={load}>새로고침</button>} />
      {msg && <div className={"card "+(msg.bad?"alert":"ok")}><span>{msg.text}</span>
        <button className="ghost" style={{marginLeft:10}} onClick={()=>setMsg(null)}>닫기</button></div>}
      {!sel ? (
        <div className="card">
          <b>다른 모둠의 질문 — 빠진 것을 찾아 태그를 붙여 주세요</b>
          {(!data || !data.targets.length) ? (
            <div className="muted" style={{marginTop:6}}>아직 판별할 다른 조 질문이 없어요.</div>
          ) : data.targets.map(t=>(
            <div key={t.version_id} className="card"
              style={{marginTop:10, cursor: t.reviewed?"default":"pointer", opacity: t.reviewed?0.55:1}}
              onClick={()=>{ if(!t.reviewed){ setSel(t.version_id); setMsg(null); } }}>
              <div className="row" style={{justifyContent:"space-between"}}>
                <b>{t.team_no}조</b>{t.reviewed && <span className="muted">되돌림 완료</span>}
              </div>
              <div className="prompt" style={{marginTop:6}}>{t.prompt}</div>
            </div>
          ))}
        </div>
      ) : (
        <div className="card">
          <div className="row" style={{justifyContent:"space-between"}}>
            <b>{target?.team_no}조 질문</b>
            <button className="ghost" onClick={()=>setSel(null)}>목록으로</button>
          </div>
          <div className="prompt" style={{marginTop:8}}>{target?.prompt}</div>
          <div className="muted" style={{marginTop:10}}>빠진 것 (탐지)</div>
          <div className="tags">
            {(cfg.tags||[]).map(({key,label,desc})=>(
              <span key={key} title={desc} className={"tag"+(tags[key]?" on":"")}
                onClick={()=>setTags({...tags,[key]:!tags[key]})}>{label}</span>
            ))}
          </div>
          <div className="muted" style={{marginTop:10}}>까닭 (변별) — 그 사람이 이 질문을 받으면 무슨 일이 일어날지 이야기로</div>
          <textarea value={reason} onChange={e=>setReason(e.target.value)}
            placeholder="예: 1학년이 이 질문으로 만든 포스터를 보면 '잔반율'에서 멈출 거예요." />
          <div className="row" style={{marginTop:10}}>
            <button className="return" onClick={submit}>태그+까닭 붙여 되돌리기</button>
          </div>
        </div>
      )}
      {data && data.received.length>0 && (
        <div className="card">
          <b>친구들이 우리 질문에 붙여 준 것</b>
          {data.received.map((r,i)=>(
            <div key={i} style={{marginTop:8}}>
              <div className="muted">{r.reviewer_no}조가</div>
              <div className="tags">{r.tags.map(t=><span key={t} className="tag shown">{t}</span>)}</div>
              <div className="prompt" style={{background:"#fff"}}>{r.reason}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─────────── 8차시 — 전이 (되돌림·AI·피드백 없음) ───────────
function TransferModule({ teamId, teamLabel, sess, cfg, onLogout }) {
  const [text, setText] = useState("");
  const [data, setData] = useState(null);
  const [msg, setMsg] = useState(null);

  const load = async () => { const r=await fetch(`${API}/api/team/${teamId}/transfer`); setData(await r.json()); };
  useEffect(() => { load(); }, [teamId]);

  const send = async () => {
    const r = await fetch(`${API}/api/team/transfer`, {method:"POST",
      headers:{"Content-Type":"application/json"}, body: JSON.stringify({team_id:Number(teamId), prompt:text})});
    if (!r.ok) { alert((await r.json()).detail); return; }
    setText(""); setMsg("냈어요. 이 차시에는 되돌림도, AI 답도, 피드백도 없어요."); load();
  };

  return (
    <div>
      <ModuleHeader sess={sess} cfg={cfg} teamLabel={teamLabel} onLogout={onLogout} />
      <div className="card">
        <b>새 문제 — 우리 학교 전기 절약</b>
        <div className="muted" style={{margin:"6px 0"}}>
          도움 없이 혼자 써 봅니다. 되돌림·태그·자기점검란 없이, 네 요소를 갖춘 질문을 써 보세요.
        </div>
        <textarea value={text} onChange={e=>setText(e.target.value)}
          placeholder="전기 절약을 위해 AI에게 무엇을 부탁할지, 우리 학교 상황을 담아 써 보세요." />
        <div className="row" style={{marginTop:10}}>
          <button className="primary" onClick={send} disabled={!text.trim()}>내기</button>
          {msg && <span className="muted">{msg}</span>}
        </div>
      </div>
      {data && data.prompts.length>0 && (
        <div className="card ok">
          <b>우리가 낸 질문</b>
          {data.prompts.map((p,i)=><div key={i} className="prompt" style={{marginTop:8, background:"#fff"}}>{p.prompt}</div>)}
        </div>
      )}
    </div>
  );
}

// ─────────── 3차시 — 데이터 카드·3질문 비교·데이터 넣어 고쳐쓰기 ───────────
function DataModule({ teamId, teamLabel, sess, cfg, onLogout }) {
  const [d, setD] = useState(null);
  const [sel, setSel] = useState([]);
  const [cardsReason, setCardsReason] = useState("");
  const [cmpNote, setCmpNote] = useState("");
  const [rewriteQ, setRewriteQ] = useState("");
  const [rewriteReason, setRewriteReason] = useState("");
  const [trace, setTrace] = useState({box:"",line:"",tri:""});
  const [summary, setSummary] = useState(["","",""]);
  const [sMembers, setSMembers] = useState(0);   // 도입 조사(조별): 우리 조 인원
  const [sReasons, setSReasons] = useState({});  // {이유: 남긴 사람 수}
  const [sEtc, setSEtc] = useState("");          // 기타 의견
  const [sending, setSending] = useState(false);
  const [gen, setGen] = useState(false);
  const [genR, setGenR] = useState(false);
  const [msg, setMsg] = useState("");

  const load = async () => {
    const r = await fetch(`${API}/api/team/${teamId}/data3`);
    const j = await r.json(); setD(j);
    setSel(prev => prev.length ? prev : j.selected);
    setCardsReason(prev => prev || j.cards_reason);
    setCmpNote(prev => prev || j.compare_note);
    setRewriteQ(prev => prev || j.rewrite_q);
    setRewriteReason(prev => prev || j.rewrite_reason);
    setTrace(prev => (prev.box||prev.line||prev.tri) ? prev : (j.trace || {box:"",line:"",tri:""}));
    setSummary(prev => prev.some(x=>x) ? prev : (j.summary && j.summary.length===3 ? j.summary : ["","",""]));
    setSMembers(prev => prev || (j.my_survey?.members||0));
    setSReasons(prev => Object.keys(prev).length ? prev : (j.my_survey?.reasons||{}));
    setSEtc(prev => prev || (j.my_survey?.etc_note||""));
  };
  useEffect(()=>{ load(); const t=setInterval(load,5000); return ()=>clearInterval(t); },[teamId]);

  const toggle = (id) => setSel(sel.includes(id) ? sel.filter(x=>x!==id) : [...sel, id]);
  const note = (key,text)=>fetch(`${API}/api/team/note`,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({team_id:Number(teamId),session_no:3,key,text})});
  const saveCards = async () => {
    await fetch(`${API}/api/team/data3/cards`,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({team_id:Number(teamId),selected:sel,reason:cardsReason})});
    setMsg("활동1을 저장했어요."); load();
  };
  const genCompare = async () => {
    setGen(true);
    const r = await fetch(`${API}/api/team/data3/compare/${teamId}`,{method:"POST"});
    if(!r.ok) setMsg((await r.json()).detail || "AI 답 생성 실패");
    setGen(false); load();
  };
  const saveCmpNote = async()=>{ await note("compare_note",cmpNote); setMsg("비교를 저장했어요."); load(); };
  const genRewrite = async () => {
    if(!rewriteQ.trim()) return;
    setGenR(true);
    const r=await fetch(`${API}/api/team/data3/rewrite`,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({team_id:Number(teamId),prompt:rewriteQ})});
    if(!r.ok) setMsg((await r.json()).detail || "AI 답 생성 실패");
    setGenR(false); load();
  };
  const saveRewriteReason = async()=>{ await note("rewrite_reason",rewriteReason); setMsg("고친 까닭을 저장했어요."); load(); };
  const setReason = (w,v)=>setSReasons({...sReasons, [w]: Math.max(0, Number(v)||0)});
  const submitSurvey = async()=>{
    setSending(true);
    await fetch(`${API}/api/team/survey`,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({team_id:Number(teamId), members:Number(sMembers)||0, reasons:sReasons, etc_note:sEtc})});
    setSending(false);
    setMsg("우리 조 조사를 저장했어요. 우리 반 전체 결과에 반영됩니다."); load();
  };
  const saveTrace = async()=>{ await Promise.all([note("trace_box",trace.box),note("trace_line",trace.line),note("trace_tri",trace.tri)]); setMsg("데이터 흔적을 저장했어요."); load(); };
  const saveSummary = async()=>{ await Promise.all([note("sum1",summary[0]),note("sum2",summary[1]),note("sum3",summary[2])]); setMsg("정리를 저장했어요."); load(); };
  const setSum = (i,v)=>setSummary(summary.map((x,ix)=>ix===i?v:x));

  if(!d) return <div className="card">불러오는 중…</div>;
  const badgeColor = (t)=>({"숫자":"#2a8a4a","이유별":"#2a6ab0","친구의 말":"#9a6a2a","관계없음":"#999"}[t]||"#999");

  return (
    <div>
      <ModuleHeader sess={sess} cfg={cfg} teamLabel={teamLabel} onLogout={onLogout}
        right={<button className="ghost" onClick={load}>새로고침</button>} />
      {cfg.intro && <div className="card" style={{background:"#eef2f8"}}>{cfg.intro}</div>}

      <div className="card">
        <b>도입 · 오늘 급식 조사 (조별)</b>
        <div className="muted" style={{margin:"4px 0"}}>
          우리 조를 조사해 <b>인원</b>과 <b>이유별 남긴 사람 수</b>를 적어요. 모든 조를 합쳐 <b>우리 반 전체 결과</b>가 됩니다.
        </div>
        <div className="row" style={{marginTop:8, alignItems:"center", gap:8}}>
          <span>우리 조 인원</span>
          <input type="number" min="0" value={sMembers} onChange={e=>setSMembers(Number(e.target.value))}
            style={{width:72,padding:8,border:"1px solid var(--line)",borderRadius:8,font:"inherit"}} />
          <span className="muted">명</span>
        </div>
        <div className="muted" style={{marginTop:10}}>급식을 남긴 사람 수 (이유별)</div>
        {(d.why_options||[]).map(w=>(
          <div key={w} className="row" style={{alignItems:"center", gap:8, marginTop:4}}>
            <span style={{minWidth:160}}>{w}</span>
            <input type="number" min="0" value={sReasons[w]||0} onChange={e=>setReason(w,e.target.value)}
              style={{width:72,padding:8,border:"1px solid var(--line)",borderRadius:8,font:"inherit"}} />
            <span className="muted">명</span>
          </div>
        ))}
        {(Number(sReasons["기타"])||0) > 0 && (
          <div style={{marginTop:8}}>
            <div className="muted">'기타' 의견 — 어떤 이유였나요? (선생님이 받아요)</div>
            <textarea value={sEtc} onChange={e=>setSEtc(e.target.value)}
              placeholder="예: 반찬이 매워서 / 배가 안 고파서 등 우리 조의 다른 이유를 적어요." />
          </div>
        )}
        <div className="muted" style={{marginTop:6}}>남긴 사람 합계: <b>{Object.values(sReasons).reduce((a,b)=>a+(Number(b)||0),0)}</b>명</div>
        <div className="row" style={{marginTop:8}}>
          <button className="primary" onClick={submitSurvey} disabled={sending}>{sending?"저장 중…":"우리 조 조사 저장"}</button>
          <span className="muted">다시 저장하면 우리 조 값이 덮어써집니다.</span>
        </div>
        <div style={{marginTop:12, borderTop:"1px dashed var(--line)", paddingTop:10}}>
          <b>우리 반 전체 결과</b>
          {d.survey.teams===0 ? (
            <div className="muted" style={{marginTop:6}}>아직 낸 조가 없어요.</div>
          ) : (
            <div style={{marginTop:6}}>
              <div>{d.survey.teams}개 조 · 우리 반 {d.survey.members}명 중 <b>{d.survey.left}명</b>이 급식을 남겼어요.</div>
              {d.survey.reasons.length>0 &&
                <div style={{marginTop:4}}>이유별: {d.survey.reasons.map(r=>`${r.why} ${r.count}명`).join(" · ")}</div>}
            </div>
          )}
          <div className="muted" style={{marginTop:6}}>이 결과가 아래 활동1의 '우리 반 정보 카드'로 정리됩니다.</div>
        </div>
      </div>

      <div className="card">
        <b>활동 1 · AI에게 알려 줄 조사 데이터 고르기</b>
        <div className="muted" style={{margin:"6px 0"}}>
          {d.cards_source==="default"
            ? "아직 선생님이 우리 반 조사 결과를 전달하지 않았어요. 지금은 예시 카드입니다. "
            : "아래는 선생님이 전달한 우리 반 조사 결과 카드입니다. "}
          이 중 우리 반 잔반 문제를 푸는 데 <b>꼭 필요한 것 2~3개</b>를 고르세요.
          (숫자·이유별·친구의 말은 도움이 되고, 관계없는 정보는 빼요.)
        </div>
        {d.cards.map(c=>(
          <label key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",cursor:"pointer"}}>
            <input type="checkbox" checked={sel.includes(c.id)} onChange={()=>toggle(c.id)} />
            <span style={{background:badgeColor(c.type),color:"#fff",padding:"1px 7px",borderRadius:6,fontSize:12,whiteSpace:"nowrap"}}>{c.type}</span>
            <span>{c.text}</span>
          </label>
        ))}
        <div className="muted" style={{marginTop:8}}>이 카드들을 고른 까닭</div>
        <textarea value={cardsReason} onChange={e=>setCardsReason(e.target.value)}
          placeholder="예: 9명이 남겼다는 숫자와 '양이 많아서'라는 원인이 있어야 맞는 방법을 받을 수 있어요. 날씨는 관계없어서 뺐어요." />
        <div><button className="primary" style={{marginTop:8}} onClick={saveCards} disabled={!sel.length}>활동1 저장</button></div>
      </div>

      <div className="card">
        <div className="row" style={{justifyContent:"space-between"}}>
          <b>활동 2 · 세 질문의 AI 답 비교하기</b>
          <button className="ghost" onClick={genCompare} disabled={gen}>{gen?"만드는 중…":"AI 답 3개 만들기"}</button>
        </div>
        <div className="muted" style={{margin:"4px 0"}}>조사 내용이 다른 세 질문에 AI가 어떻게 다르게 답하는지 비교해요.</div>
        {d.questions.map(q=>(
          <div key={q.key} style={{marginTop:10,borderTop:"1px dashed var(--line)",paddingTop:8}}>
            <b>{q.label}</b>
            <div className="prompt" style={{marginTop:4}}>{q.q}</div>
            {d.answers[q.key] ? (
              <div style={{marginTop:6}}>
                <div className="muted">AI 답</div>
                <div className="prompt" style={{background:"#fff",border:"1px solid #cde8d5"}}>{stripMd(d.answers[q.key])}</div>
              </div>
            ) : <div className="muted" style={{marginTop:6}}>아직 AI 답이 없어요. 위 버튼을 눌러 만들어요.</div>}
          </div>
        ))}
        <div className="muted" style={{marginTop:10}}>세 답은 어떻게 달랐나요? (질문 가·나·다의 차이)</div>
        <textarea value={cmpNote} onChange={e=>setCmpNote(e.target.value)}
          placeholder="예: 가는 어느 학교에나 되는 일반적인 답, 나는 숫자만 있어 원인이 없음, 다는 원인이 있어 음식양 조절 방법이 나왔어요." />
        <div><button className="primary" style={{marginTop:8}} onClick={saveCmpNote} disabled={!cmpNote.trim()}>비교 저장</button></div>

        <div style={{marginTop:14, borderTop:"1px dashed var(--line)", paddingTop:10}}>
          <b>데이터 흔적 표시</b>
          <div className="muted" style={{margin:"4px 0"}}>질문 '다'의 AI 답을 보고, 아래 세 가지를 찾아 적어요.</div>
          <div className="muted">□ 우리 조사 데이터가 그대로 나온 부분</div>
          <textarea value={trace.box} onChange={e=>setTrace({...trace,box:e.target.value})}
            placeholder="예: '9명', '양이 많아서' 같은 우리 조사 내용이 답에 그대로 나왔어요." />
          <div className="muted">밑줄 — 조사 데이터와 연결된 해결 방법</div>
          <textarea value={trace.line} onChange={e=>setTrace({...trace,line:e.target.value})}
            placeholder="예: '양이 많아서'와 연결해 '적당히 담기/양 조절' 방법을 알려 줬어요." />
          <div className="muted">△ AI가 일반적으로 덧붙였거나 확인이 필요한 부분</div>
          <textarea value={trace.tri} onChange={e=>setTrace({...trace,tri:e.target.value})}
            placeholder="예: 우리 반 사정과 관계없이 일반적으로 덧붙인 내용이에요." />
          <div><button className="primary" style={{marginTop:8}} onClick={saveTrace}
            disabled={!(trace.box||trace.line||trace.tri)}>흔적 저장</button></div>
        </div>
      </div>

      <div className="card">
        <b>활동 3 · 데이터를 넣어 질문 고쳐 쓰기</b>
        <div className="muted" style={{margin:"6px 0"}}>활동1에서 고른 데이터를 넣어 질문 전체를 고쳐 쓰고, AI에게 보내 답을 받아요.</div>
        <textarea value={rewriteQ} onChange={e=>setRewriteQ(e.target.value)}
          placeholder="예: 오늘 우리 반 24명 중 9명이 급식을 남겼고, 그중 6명은 양이 많아서 남겼습니다. 이 조사 결과를 바탕으로 우리 반의 급식 잔반을 줄이는 방법을 제안해 주세요." />
        <div className="row" style={{marginTop:8}}>
          <button className="primary" onClick={genRewrite} disabled={genR||!rewriteQ.trim()}>{genR?"보내는 중…":"AI에게 보내기"}</button>
        </div>
        {d.rewrite_ans && (
          <div style={{marginTop:8}}>
            <div className="muted">AI 답</div>
            <div className="prompt" style={{background:"#fff",border:"1px solid #cde8d5"}}>{stripMd(d.rewrite_ans)}</div>
          </div>
        )}
        <div className="muted" style={{marginTop:10}}>고친 까닭을 한 문장으로 써요.</div>
        <textarea value={rewriteReason} onChange={e=>setRewriteReason(e.target.value)}
          placeholder="예: 몇 명이 왜 남겼는지 조사 내용을 넣으니 우리 반에 맞는 구체적인 방법이 나왔어요." />
        <div><button className="primary" style={{marginTop:8}} onClick={saveRewriteReason} disabled={!rewriteReason.trim()}>까닭 저장</button></div>
      </div>

      <div className="card">
        <b>정리 · '데이터 한 스푼' 원칙</b>
        <div className="muted" style={{margin:"4px 0"}}>오늘 배운 내용을 문장으로 완성해요.</div>
        <div style={{marginTop:8, lineHeight:2.2}}>
          <div>처음 질문에는{" "}
            <input value={summary[0]} onChange={e=>setSum(0,e.target.value)}
              style={{padding:6,border:"1px solid var(--line)",borderRadius:6,font:"inherit",minWidth:180}} />
            {" "}이(가) 빠져 있었다.
          </div>
          <div>조사 내용을 넣자 AI의 답이{" "}
            <input value={summary[1]} onChange={e=>setSum(1,e.target.value)}
              style={{padding:6,border:"1px solid var(--line)",borderRadius:6,font:"inherit",minWidth:180}} />
            {" "}하게 달라졌다.
          </div>
          <div>AI에게 조사 내용을 알려 줄 때는{" "}
            <input value={summary[2]} onChange={e=>setSum(2,e.target.value)}
              style={{padding:6,border:"1px solid var(--line)",borderRadius:6,font:"inherit",minWidth:180}} />
            {" "}을(를) 확인해야 한다.
          </div>
        </div>
        <div><button className="primary" style={{marginTop:8}} onClick={saveSummary}
          disabled={!summary.some(x=>x.trim())}>정리 저장</button></div>
      </div>

      {msg && <div className="card ok"><span>{msg}</span><button className="ghost" style={{marginLeft:10}} onClick={()=>setMsg("")}>닫기</button></div>}
    </div>
  );
}

// ─────────── 2차시 활동3 — 통과 답 O/X 적합 판정 + 최종 선정 ───────────
function ActivitySection({ teamId, sess }) {
  const [data, setData] = useState(null);
  const [edit, setEdit] = useState({});     // {idx:{fit,reason}}
  const [final, setFinal] = useState("");
  const [editingFinal, setEditingFinal] = useState(false);
  const [msg, setMsg] = useState(null);

  const load = async () => {
    const r = await fetch(`${API}/api/team/${teamId}/activity/${sess}`);
    const d = await r.json(); setData(d);
    setEdit(prev => {
      const e = {...prev};
      d.options.forEach(o => { if (!(o.idx in e)) e[o.idx] = {fit:o.fit, reason:o.reason||""}; });
      return e;
    });
    setFinal(prev => prev || d.final || "");
  };
  useEffect(() => { load(); const t=setInterval(load,5000); return ()=>clearInterval(t); }, [teamId, sess]);

  const saveOpt = async (idx) => {
    const v = edit[idx] || {};
    const r = await fetch(`${API}/api/team/activity/option`, {method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({team_id:Number(teamId), session_no:Number(sess), idx,
                            fit: (v.fit===undefined?null:v.fit), reason: v.reason||""})});
    if (!r.ok) { setMsg((await r.json()).detail); return; }
    setMsg(null); load();
  };
  const saveFinal = async () => {
    await fetch(`${API}/api/team/note`, {method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({team_id:Number(teamId), session_no:Number(sess), key:"final", text:final})});
    load();
  };

  if (!data || !data.options.length) return (
    <div className="card">
      <b>활동 3 · 적합한 활동 고르기</b>
      <div className="muted" style={{marginTop:6}}>질문이 통과되면 AI가 준 방법이 여기에 나타나요. 그때 O/X로 골라 봅니다.</div>
    </div>
  );
  return (
    <div className="card">
      <b>활동 3 · 적합한 활동 고르고 최종 선정하기</b>
      <div className="muted" style={{marginBottom:6}}>
        AI가 알려준 내용 중 우리가 실제 활동하기 적합한 활동을 골라보고(O/X),
        분류한 이유를 적은 뒤, 최종적으로 어떤 활동을 할지 선정해봅시다.
      </div>
      {data.options.map(o => (
        <div key={o.idx} style={{marginTop:10, borderTop:"1px dashed var(--line)", paddingTop:8}}>
          <div><b>{o.idx}.</b> {o.text}</div>
          <div className="tags" style={{marginTop:6}}>
            {[["O 적합",true],["X 부적합",false]].map(([lab,val]) => (
              <span key={lab} className={"tag"+(edit[o.idx]?.fit===val?" on":"")}
                onClick={()=>setEdit({...edit,[o.idx]:{...edit[o.idx],fit:val}})}>{lab}</span>
            ))}
          </div>
          {(edit[o.idx]?.fit===true || edit[o.idx]?.fit===false) && (
            <input placeholder="분류한 이유" value={edit[o.idx]?.reason||""}
              onChange={e=>setEdit({...edit,[o.idx]:{...edit[o.idx],reason:e.target.value}})}
              style={{width:"100%",marginTop:6,padding:8,border:"1px solid var(--line)",borderRadius:8,font:"inherit"}} />
          )}
          <div><button className="ghost" style={{marginTop:6}} onClick={()=>saveOpt(o.idx)}>저장</button></div>
        </div>
      ))}
      {msg && <div className="hint" style={{marginTop:8}}>{msg}</div>}
      <div className="muted" style={{marginTop:14}}>최종적으로 선정한 활동을 적어봅시다.</div>
      {(!data.final || editingFinal) ? (
        <>
          <textarea value={final} onChange={e=>setFinal(e.target.value)} placeholder="우리 조가 실제로 할 활동을 적어요." />
          <div><button className="primary" style={{marginTop:8}} disabled={!final.trim()}
            onClick={async()=>{ await saveFinal(); setEditingFinal(false); }}>최종 선정 저장</button></div>
        </>
      ) : (
        <div>
          <div className="prompt" style={{background:"#fff", border:"1px solid #cde8d5"}}>{data.final}</div>
          <button className="ghost" style={{marginTop:8}}
            onClick={()=>{ setFinal(data.final); setEditingFinal(true); }}>수정</button>
        </div>
      )}
    </div>
  );
}

// ─────────── 첫 화면 — 역할 선택 ───────────
function Home({ go }) {
  return (
    <div>
      <div className="muted" style={{margin:"4px 0 14px"}}>누구로 들어오나요?</div>
      <div className="row" style={{gap:14, alignItems:"stretch"}}>
        <div className="card loginpick" onClick={()=>go("studentLogin")}
          style={{flex:1, cursor:"pointer", textAlign:"center", padding:"26px 18px"}}>
          <div style={{fontSize:34}}>🧑‍🤝‍🧑</div>
          <b style={{display:"block", margin:"6px 0"}}>학생 (조) 로그인</b>
          <div className="muted">우리 조로 들어가 질문을 만들고, AI 대화를 조원과 함께 봅니다.</div>
        </div>
        <div className="card loginpick" onClick={()=>go("teacherLogin")}
          style={{flex:1, cursor:"pointer", textAlign:"center", padding:"26px 18px"}}>
          <div style={{fontSize:34}}>🧑‍🏫</div>
          <b style={{display:"block", margin:"6px 0"}}>교사 로그인</b>
          <div className="muted">우리 반 대기열을 보고 통과 / 되돌림을 결정합니다.</div>
        </div>
      </div>
      <div style={{marginTop:16, textAlign:"center"}}>
        <button className="ghost" onClick={()=>go("admin")}>연구자 화면</button>
      </div>
    </div>
  );
}

// ─────────── 학생(조) 로그인 ───────────
function StudentLogin({ sessCfg, presetClass, onEnter, onBack }) {
  const [classes, setClasses] = useState([]);
  const [teamId, setTeamId] = useState("");
  const [sess, setSess] = useState(1);
  const sessions = Object.values(sessCfg).sort((a,b)=>a.no-b.no);
  useEffect(() => {
    fetch(`${API}/api/classrooms`).then(r=>r.json()).then(cs => {
      // 딥링크(?s=N)면 그 학급만 보여 준다
      const filtered = presetClass ? cs.filter(c => String(c.name) === String(presetClass)) : cs;
      setClasses(filtered);
      const first = filtered.find(c => c.teams.length);
      if (first) setTeamId(String(first.teams[0].team_id));
    });
  }, []);
  const classOf = (tid) => classes.find(c => c.teams.some(t => String(t.team_id) === String(tid)));
  const selClass = classOf(teamId);
  const locked = selClass && selClass.active_session > 0 ? selClass.active_session : 0;
  useEffect(() => { if (locked) setSess(locked); }, [locked]);
  const labelFor = (tid) => {
    for (const c of classes)
      for (const t of c.teams)
        if (String(t.team_id) === String(tid)) return `${cn(c)} · ${t.number}조`;
    return "";
  };
  const effSess = locked || Number(sess);
  const enter = () => { if (teamId) onEnter({ teamId, teamLabel: labelFor(teamId), sess: effSess, classroomId: selClass?.classroom_id }); };
  return (
    <div className="card" style={{maxWidth:480}}>
      <b>학생 (조) 로그인{presetClass ? ` — ${presetClass}학급` : ""}</b>
      <div className="muted" style={{margin:"6px 0 14px"}}>우리 조와 차시를 고르세요.</div>
      <label style={{display:"block", marginBottom:12}}>조<br/>
        <select value={teamId} onChange={e=>setTeamId(e.target.value)} style={{width:"100%", marginTop:4}}>
          {classes.map(c => (
            <optgroup key={c.classroom_id} label={`${cn(c)}학급`}>
              {c.teams.map(t => (
                <option key={t.team_id} value={t.team_id}>{cn(c)}학급 · {t.number}조</option>
              ))}
            </optgroup>
          ))}
        </select>
      </label>
      <label style={{display:"block", marginBottom:16}}>차시<br/>
        {locked ? (
          <div style={{marginTop:4}}>
            <div className="prompt">{locked}차시 · {(sessCfg[locked]||{}).title||""}</div>
            <div className="muted" style={{marginTop:4}}>선생님이 지금 <b>{locked}차시</b>만 열어 두었어요.</div>
          </div>
        ) : (
          <select value={sess} onChange={e=>setSess(Number(e.target.value))} style={{width:"100%", marginTop:4}}>
            {sessions.length === 0 && <option value={1}>불러오는 중…</option>}
            {sessions.map(sc => (
              <option key={sc.no} value={sc.no}>{sc.no}차시 · {sc.title}</option>
            ))}
          </select>
        )}
      </label>
      <div className="row">
        <button className="primary" onClick={enter} disabled={!teamId}>입장하기</button>
        <button className="ghost" onClick={onBack}>처음으로</button>
      </div>
    </div>
  );
}

// ─────────── 교사 로그인 ───────────
function TeacherLogin({ onEnter, onBack }) {
  const [classes, setClasses] = useState([]);
  const [cid, setCid] = useState("");
  useEffect(() => {
    fetch(`${API}/api/classrooms`).then(r=>r.json()).then(cs => {
      setClasses(cs);
      if (cs.length) setCid(String(cs[0].classroom_id));
    });
  }, []);
  const labelFor = (id) => {
    const c = classes.find(c => String(c.classroom_id) === String(id));
    return c ? `${cn(c)}학급` : "";
  };
  const enter = () => { if (cid) onEnter({ classroomId: Number(cid), classLabel: labelFor(cid) }); };
  return (
    <div className="card" style={{maxWidth:480}}>
      <b>교사 로그인</b>
      <div className="muted" style={{margin:"6px 0 14px"}}>담당 학급을 고르세요.</div>
      <label style={{display:"block", marginBottom:16}}>학급<br/>
        <select value={cid} onChange={e=>setCid(e.target.value)} style={{width:"100%", marginTop:4}}>
          {classes.map(c => (
            <option key={c.classroom_id} value={c.classroom_id}>{cn(c)}학급</option>
          ))}
        </select>
      </label>
      <div className="row">
        <button className="primary" onClick={enter} disabled={!cid}>입장하기</button>
        <button className="ghost" onClick={onBack}>처음으로</button>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("home");   // home | studentLogin | teacherLogin | team | teacher | admin
  const [creds, setCreds] = useState({});
  const [sessCfg, setSessCfg] = useState({});     // {no: {mode,title,question,placeholder,selfcheck}}
  const [presetClass, setPresetClass] = useState(null);  // ?s=N 학생 딥링크의 학급
  useEffect(() => {
    fetch(`${API}/api/config/sessions`).then(r=>r.json()).then(d=>{
      const m = {}; d.sessions.forEach(sc => m[sc.no] = sc); setSessCfg(m);
    });
    // 주소로 바로 로그인 화면 열기
    //  ?role=teacher → 교사 로그인 / ?role=student → 학생 로그인
    //  ?t=1 → 1학급 교사 바로 입장 / ?s=1 → 1학급 학생 로그인
    const q = new URLSearchParams(location.search);
    const role = q.get("role");
    const t = q.get("t"), s = q.get("s");
    if (role === "teacher" || t === "") { setScreen("teacherLogin"); return; }
    if (role === "student" || s === "") { setScreen("studentLogin"); return; }
    if (t || s) {
      fetch(`${API}/api/classrooms`).then(r=>r.json()).then(cs => {
        if (t) {
          const c = cs.find(x => String(x.name) === String(t));
          if (c) { setCreds({ classroomId: c.classroom_id, classLabel: `${cn(c)}학급` }); setScreen("teacher"); }
        } else if (s) {
          setPresetClass(s); setScreen("studentLogin");
        }
      });
    }
  }, []);
  const home = () => { setCreds({}); setPresetClass(null); setScreen("home"); };

  // 진행 중 선생님이 연 차시가 바뀌면 학생을 막는다.
  const [gate, setGate] = useState(0);
  useEffect(() => {
    if (screen !== "team" || !creds.classroomId) { setGate(0); return; }
    const check = () => fetch(`${API}/api/classrooms`).then(r=>r.json()).then(cs => {
      const c = (cs||[]).find(x => x.classroom_id === Number(creds.classroomId));
      const a = c ? (c.active_session||0) : 0;
      setGate(a > 0 && a !== Number(creds.sess) ? a : 0);
    }).catch(()=>{});
    check(); const t = setInterval(check, 5000); return () => clearInterval(t);
  }, [screen, creds.classroomId, creds.sess]);

  // 차시가 기능을 고정한다 — 로그인에서 고른 차시의 모드로 화면을 라우팅
  const studentModule = () => {
    if (gate) return (
      <div className="card" style={{textAlign:"center", padding:"28px 18px"}}>
        <div style={{fontSize:34}}>⏳</div>
        <b style={{display:"block", margin:"8px 0"}}>선생님이 지금은 {gate}차시를 열었어요.</b>
        <div className="muted">이 차시는 잠시 닫혔습니다. 처음으로 가서 {gate}차시로 다시 들어오세요.</div>
        <button className="primary" style={{marginTop:14}} onClick={home}>처음으로</button>
      </div>
    );
    const cfg = sessCfg[creds.sess] || {};
    const p = { ...creds, cfg, onLogout: home };
    switch (cfg.mode) {
      case "judge":    return <JudgeModule {...p} />;
      case "data":     return <DataModule {...p} />;
      case "retrace":  return <RetraceModule {...p} />;
      case "peer":     return <PeerModule {...p} />;
      case "transfer": return <TransferModule {...p} />;
      case "loop":     return <TeamView {...p} />;
      default:         return <div className="card">차시 설정을 불러오는 중…</div>;
    }
  };

  return (
    <div className="wrap">
      <h1>prompt-gate</h1>
      <div className="sub">되돌림 루프 — 차시마다 다른 활동이 켜집니다.</div>
      {screen === "home"         && <Home go={setScreen} />}
      {screen === "studentLogin" && <StudentLogin sessCfg={sessCfg} presetClass={presetClass} onBack={home} onEnter={c=>{setCreds(c); setScreen("team");}} />}
      {screen === "teacherLogin" && <TeacherLogin onBack={home} onEnter={c=>{setCreds(c); setScreen("teacher");}} />}
      {screen === "team"         && studentModule()}
      {screen === "teacher"      && <TeacherView {...creds} sessCfg={sessCfg} onLogout={home} />}
      {screen === "admin"        && <AdminView onLogout={home} />}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
